<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>diAry — Your Private Space</title>
    <script type="text/javascript">
      // GitHub Pages SPA redirect
      // Converts the path into a query string so index.html can restore it
      // e.g. /dashboard -> /?/dashboard
      var pathSegmentsToKeep = 0; // 0 for custom domain, 1 for project pages (username.github.io/repo)

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
